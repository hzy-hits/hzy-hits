<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 140" fill="none">
  <style>
    .box { rx: 6; ry: 6; stroke-width: 1.2; }
    .label { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; font-size: 18px; font-weight: 600; fill: #e6edf3; }
    .desc { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11.5px; fill: #8b949e; }
    .arrow { stroke: #484f58; stroke-width: 1.2; fill: none; marker-end: url(#tri); }
  </style>
  <defs>
    <marker id="tri" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#484f58" />
    </marker>
  </defs>

  <!-- Box 1: Constrain -->
  <rect x="16" y="20" width="240" height="100" class="box" fill="#0d1117" stroke="#58a6ff" />
  <text x="136" y="60" text-anchor="middle" class="label" fill="#58a6ff">Constrain</text>
  <text x="136" y="82" text-anchor="middle" class="desc">define the action space</text>
  <text x="136" y="98" text-anchor="middle" class="desc">agents can only use these tools</text>

  <!-- Arrow 1 -->
  <path d="M 256 70 L 310 70" class="arrow" />

  <!-- Box 2: Observe -->
  <rect x="320" y="20" width="240" height="100" class="box" fill="#0d1117" stroke="#d29922" />
  <text x="440" y="60" text-anchor="middle" class="label" fill="#d29922">Observe</text>
  <text x="440" y="82" text-anchor="middle" class="desc">enforce boundaries</text>
  <text x="440" y="98" text-anchor="middle" class="desc">watch what happens inside</text>

  <!-- Arrow 2 -->
  <path d="M 560 70 L 614 70" class="arrow" />

  <!-- Box 3: Evaluate -->
  <rect x="624" y="20" width="240" height="100" class="box" fill="#0d1117" stroke="#3fb950" />
  <text x="744" y="60" text-anchor="middle" class="label" fill="#3fb950">Evaluate</text>
  <text x="744" y="82" text-anchor="middle" class="desc">hidden holdout, binary feedback</text>
  <text x="744" y="98" text-anchor="middle" class="desc">the agent never sees the test set</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" fill="none">
  <style>
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: 600; fill: #e6edf3; }
    .subtitle { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; fill: #8b949e; }
    .arrow { stroke: #8b949e; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e" />
    </marker>
  </defs>

  <!-- Box 1: Deterministic Tools -->
  <rect x="20" y="30" width="240" height="100" class="box" fill="#161b22" stroke="#58a6ff" />
  <text x="140" y="72" text-anchor="middle" class="title">Deterministic Tools</text>
  <text x="140" y="96" text-anchor="middle" class="subtitle">what it can use</text>

  <!-- Arrow 1 -->
  <path d="M 260 80 L 320 80" class="arrow" />

  <!-- Box 2: Boundary Functions -->
  <rect x="330" y="30" width="240" height="100" class="box" fill="#161b22" stroke="#d29922" />
  <text x="450" y="72" text-anchor="middle" class="title">Boundary Functions</text>
  <text x="450" y="96" text-anchor="middle" class="subtitle">what "good" means</text>

  <!-- Arrow 2 -->
  <path d="M 570 80 L 630 80" class="arrow" />

  <!-- Box 3: AI Agent -->
  <rect x="640" y="30" width="240" height="100" class="box" fill="#161b22" stroke="#3fb950" />
  <text x="760" y="72" text-anchor="middle" class="title">AI Agent Explores</text>
  <text x="760" y="96" text-anchor="middle" class="subtitle">finds the answer</text>
</svg>
